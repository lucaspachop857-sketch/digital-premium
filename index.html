<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Premium</title>

<style>
body { margin:0; font-family:Arial; background:#0b0f19; color:white; }

header {
    background:#000;
    padding:15px;
    text-align:center;
    color:#e50914;
    font-weight:bold;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    padding:10px;
}

.card {
    background:#141414;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.price { color:#46d369; }

button {
    background:#e50914;
    border:none;
    padding:8px;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

.nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-around;
    padding:10px;
}

.hidden { display:none; }

#recomendado {
    background:#111;
    padding:10px;
    margin:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>🔥 Digital Premium</header>

<!-- LOGIN -->
<div id="login" style="text-align:center; padding:20px;">
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Entrar</button>
</div>

<!-- HOME -->
<div id="home" class="hidden">

<h3 style="padding:10px;">📺 Servicios</h3>
<div class="grid" id="productos"></div>

<h3 style="padding:10px;">📦 Combos</h3>
<div class="grid">

<div class="card">
<h4>Combo Full</h4>
<p>Netflix + Spotify + Disney</p>
<p class="price">$35.000</p>
<button onclick="add('Combo Full')">Agregar</button>
</div>

<div class="card">
<h4>Combo Básico</h4>
<p>Netflix + Spotify</p>
<p class="price">$20.000</p>
<button onclick="add('Combo Básico')">Agregar</button>
</div>

</div>

<!-- RECOMENDACIÓN -->
<div id="recomendado" class="hidden"></div>

</div>

<!-- CARRITO -->
<div id="carrito" class="hidden">
<h3 style="padding:10px;">🛒 Carrito</h3>
<ul id="lista"></ul>
<button onclick="pagar()">Finalizar compra</button>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">🏠</button>
<button onclick="show('carrito')">🛒</button>
</div>

<script>

let moneda = "COP";
if(navigator.language.includes("en")) moneda = "USD";

const productos = [
{name:"Netflix",price:13000},
{name:"Spotify",price:9000},
{name:"Disney+",price:7000},
{name:"HBO Max",price:7000},
{name:"Prime Video",price:8000}
];

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function render(){
let html="";
productos.forEach(p=>{
let precio = moneda=="USD" ? (p.price/4000).toFixed(2)+" USD" : "$"+p.price;

html+=`
<div class="card">
<h4>${p.name}</h4>
<p class="price">${precio}</p>
<button onclick="add('${p.name}')">Agregar</button>
</div>`;
});
document.getElementById("productos").innerHTML=html;
}
render();

function add(item){
carrito.push(item);
localStorage.setItem("carrito", JSON.stringify(carrito));
alert("Agregado al carrito");
recomendar();
}

function recomendar(){
if(carrito.includes("Netflix")){
document.getElementById("recomendado").classList.remove("hidden");
document.getElementById("recomendado").innerHTML =
"🔥 Recomendado: Agrega Spotify y ahorra más dinero";
}
}

function show(v){
document.getElementById("home").classList.add("hidden");
document.getElementById("carrito").classList.add("hidden");
document.getElementById(v).classList.remove("hidden");

if(v=="carrito"){
let html="";
carrito.forEach(i=>html+=<li>${i}</li>);
document.getElementById("lista").innerHTML=html;
}
}

function login(){
localStorage.setItem("user","ok");
document.getElementById("login").classList.add("hidden");
document.getElementById("home").classList.remove("hidden");
}

function pagar(){
let msg="Hola 👋 quiero comprar los siguientes servicios:%0A%0A";

carrito.forEach(i=>msg+="✔ "+i+"%0A");

msg+="%0A¿Me ayudas con el proceso de compra?";

window.location.href="https://wa.me/573165011242?text="+msg;
}

</script>

</body>
</html>
