<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Premium</title>

<style>
body {
  margin:0;
  font-family:system-ui, Arial;
  background:#0b0f19;
  color:#fff;
}

/* HEADER */
header {
  background:#000;
  padding:14px;
  text-align:center;
  color:#e50914;
  font-weight:600;
  font-size:18px;
}

/* CONTENEDOR */
.container {
  max-width:900px;
  margin:auto;
  padding:15px;
}

/* TITULOS */
h3 {
  margin:15px 0 10px;
  font-size:16px;
  color:#ccc;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
}

/* CARD */
.card {
  background:#141414;
  border-radius:10px;
  padding:12px;
  text-align:center;
  border:1px solid #1f1f1f;
  transition:0.2s;
}

.card:hover {
  transform:translateY(-2px);
}

/* PRECIO */
.price {
  color:#46d369;
  font-weight:bold;
  margin:6px 0;
}

/* BOTÓN */
button {
  background:#e50914;
  border:none;
  padding:8px;
  border-radius:6px;
  color:white;
  cursor:pointer;
  width:100%;
  font-size:13px;
}

button:hover {
  background:#ff1e2d;
}

/* CARRITO */
.cart {
  position:fixed;
  bottom:15px;
  right:15px;
  background:#e50914;
  padding:12px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
}

</style>
</head>

<body>

<header>🔥 Digital Premium</header>

<div class="container">

<h3>📺 Servicios</h3>
<div class="grid">

<div class="card">
Netflix
<p class="price">$13.000</p>
<button onclick="add('Netflix')">Agregar</button>
</div>

<div class="card">
Spotify
<p class="price">$9.000</p>
<button onclick="add('Spotify')">Agregar</button>
</div>

<div class="card">
Disney+
<p class="price">$7.000</p>
<button onclick="add('Disney+')">Agregar</button>
</div>

</div>

<h3>📦 Combos</h3>
<div class="grid">

<div class="card">
Combo Full
<p>Netflix + Spotify + Disney</p>
<p class="price">$35.000</p>
<button onclick="add('Combo Full')">Agregar</button>
</div>

<div class="card">
Combo Básico
<p>Netflix + Spotify</p>
<p class="price">$20.000</p>
<button onclick="add('Combo Básico')">Agregar</button>
</div>

</div>

</div>

<div class="cart" onclick="pagar()">🛒</div>

<script>
let carrito=[];

function add(item){
  carrito.push(item);
  alert("Agregado: " + item);
}

function pagar(){
  if(carrito.length===0){
    alert("Carrito vacío");
    return;
  }

  let msg="Hola 👋 quiero comprar:%0A%0A";
  carrito.forEach(i=>msg+="✔ "+i+"%0A");

  window.location.href="https://wa.me/573165011242?text="+msg;
}
</script>

</body>
</html>
