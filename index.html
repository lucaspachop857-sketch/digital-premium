<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Premium</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* TOP */
.top{
  background:#0f7a2f;
  color:white;
  text-align:center;
  padding:8px;
  font-size:14px;
}

/* NAV */
nav{
  background:#1aa34a;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  color:white;
  font-weight:bold;
}

.search input{
  padding:6px;
  border:none;
  border-radius:20px;
}

/* MENU */
.menu{
  background:#1aa34a;
  color:white;
  padding:10px;
  display:flex;
  justify-content:center;
  gap:20px;
}

/* LAYOUT */
.main{
  display:flex;
  max-width:1200px;
  margin:auto;
  gap:20px;
  padding:20px;
}

/* FILTRO */
.sidebar{
  width:200px;
  background:white;
  padding:15px;
  border-radius:10px;
}

.sidebar h4{
  margin-top:0;
}

/* PRODUCTOS */
.products{
  flex:1;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background:white;
  border-radius:12px;
  padding:15px;
  text-align:center;
  position:relative;
  border:1px solid #ddd;
}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:black;
  color:white;
  padding:5px;
  border-radius:50%;
  font-size:12px;
}

.card img{
  width:100%;
  height:100px;
  object-fit:contain;
}

.old{
  text-decoration:line-through;
  color:#888;
}

.price{
  color:#1aa34a;
  font-weight:bold;
}

button{
  background:#1aa34a;
  color:white;
  border:none;
  padding:8px;
  border-radius:6px;
  width:100%;
  cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="top">🔥 Productos digitales en oferta ¡Compra aquí!</div>

<nav>
<div class="logo">Digital Premium</div>
<div class="search"><input placeholder="Buscar..."></div>
</nav>

<div class="menu">
Inicio | Productos | Cómo comprar | Contacto
</div>

<div class="main">

<div class="sidebar">
<h4>Filtrar</h4>
<p>✔ Streaming</p>
<p>✔ Música</p>
<p>✔ Combos</p>
</div>

<div class="products">

<h2>Streaming</h2>

<div class="grid">

<div class="card">
<div class="badge">40%</div>
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
<p>Netflix</p>
<p class="old">$25.000</p>
<p class="price">$13.000</p>
<button onclick="buy('Netflix')">Comprar</button>
</div>

<div class="card">
<div class="badge">47%</div>
<img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg">
<p>Spotify</p>
<p class="old">$20.000</p>
<p class="price">$9.000</p>
<button onclick="buy('Spotify')">Comprar</button>
</div>

<div class="card">
<div class="badge">48%</div>
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg">
<p>Disney+</p>
<p class="old">$17.000</p>
<p class="price">$7.000</p>
<button onclick="buy('Disney+')">Comprar</button>
</div>

<div class="card">
<div class="badge">44%</div>
<img src="https://upload.wikimedia.org/wikipedia/commons/3/33/HBO_Max_Logo.svg">
<p>HBO Max</p>
<p class="old">$15.000</p>
<p class="price">$8.000</p>
<button onclick="buy('HBO Max')">Comprar</button>
</div>

</div>

</div>

</div>

<div class="whatsapp" onclick="whatsapp()">💬</div>

<script>
function buy(product){
  alert("Agregado: " + product);
}

function whatsapp(){
  window.location.href="https://wa.me/573165011242";
}
</script>

</body>
</html>
