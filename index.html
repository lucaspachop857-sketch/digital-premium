<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Premium</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0f19;
  color:white;
}

header {
  background:#000;
  padding:20px;
  text-align:center;
  color:#e50914;
  font-size:22px;
  font-weight:bold;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:15px;
}

/* CARD PRO */
.card {
  background:#141414;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,0.5);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px) scale(1.03);
}

/* IMAGEN */
.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

/* CONTENIDO */
.content {
  padding:10px;
  text-align:center;
}

.price {
  color:#46d369;
  font-size:18px;
  font-weight:bold;
}

/* BOTÓN */
button {
  width:100%;
  background:linear-gradient(45deg,#e50914,#ff3b3b);
  border:none;
  padding:10px;
  color:white;
  border-radius:8px;
  cursor:pointer;
  margin-top:8px;
}

button:hover {
  opacity:0.8;
}

/* TITULOS */
h3 {
  padding-left:15px;
}
</style>
</head>

<body>

<header>🔥 Digital Premium</header>

<h3>📺 Servicios</h3>

<div class="grid">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
<div class="content">
<h4>Netflix</h4>
<p class="price">$13.000</p>
<button onclick="add('Netflix')">Agregar</button>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg">
<div class="content">
<h4>Spotify</h4>
<p class="price">$9.000</p>
<button onclick="add('Spotify')">Agregar</button>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg">
<div class="content">
<h4>Disney+</h4>
<p class="price">$7.000</p>
<button onclick="add('Disney+')">Agregar</button>
</div>
</div>

</div>

<h3>📦 Combos</h3>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1593784991095-a205069470b6">
<div class="content">
<h4>Combo Full</h4>
<p>Netflix + Spotify + Disney</p>
<p class="price">$35.000</p>
<button onclick="add('Combo Full')">Agregar</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1611162616475-46b635cb6868">
<div class="content">
<h4>Combo Básico</h4>
<p>Netflix + Spotify</p>
<p class="price">$20.000</p>
<button onclick="add('Combo Básico')">Agregar</button>
</div>
</div>

</div>

<div style="padding:20px;">
<button onclick="pagar()">🛒 Finalizar compra</button>
</div>

<script>
let carrito=[];

function add(item){
  carrito.push(item);
  alert("Agregado: " + item);
}

function pagar(){
  let msg="Hola 👋 quiero comprar:%0A%0A";
  carrito.forEach(i=>msg+="✔ "+i+"%0A");

  window.location.href="https://wa.me/573165011242?text="+msg;
}
</script>

</body>
</html>
