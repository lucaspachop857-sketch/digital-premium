<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Premium</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0f19;
  color:white;
}

/* HEADER */
header {
  position:fixed;
  width:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
  padding:15px;
  z-index:10;
  color:#e50914;
  font-weight:bold;
}

/* HERO */
.hero {
  height:250px;
  background:url("https://images.unsplash.com/photo-1593784991095-a205069470b6") center/cover;
  display:flex;
  align-items:flex-end;
  padding:20px;
}

.hero h1 {
  margin:0;
}

/* SECCIONES */
.section {
  padding:15px;
}

.row {
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.row::-webkit-scrollbar {
  display:none;
}

/* CARD */
.card {
  min-width:150px;
  background:#141414;
  border-radius:10px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.1);
}

/* IMG */
.card img {
  width:100%;
  height:100px;
  object-fit:cover;
}

/* INFO */
.info {
  padding:8px;
  text-align:center;
}

.price {
  color:#46d369;
}

/* BOTÓN */
button {
  width:100%;
  background:#e50914;
  border:none;
  padding:6px;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

/* BOTÓN FLOTANTE */
.cart {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#e50914;
  padding:15px;
  border-radius:50%;
  font-size:20px;
}
</style>
</head>

<body>

<header>🔥 Digital Premium</header>

<div class="hero">
<h1>Streaming Premium</h1>
</div>

<div class="section">
<h3>🔥 Populares</h3>

<div class="row">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
<div class="info">
Netflix
<p class="price">$13.000</p>
<button onclick="add('Netflix')">Agregar</button>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg">
<div class="info">
Spotify
<p class="price">$9.000</p>
<button onclick="add('Spotify')">Agregar</button>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg">
<div class="info">
Disney+
<p class="price">$7.000</p>
<button onclick="add('Disney+')">Agregar</button>
</div>
</div>

</div>
</div>

<div class="section">
<h3>📦 Combos</h3>

<div class="row">

<div class="card">
<img src="https://images.unsplash.com/photo-1611162616475-46b635cb6868">
<div class="info">
Combo Full
<p class="price">$35.000</p>
<button onclick="add('Combo Full')">Agregar</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1593784991095-a205069470b6">
<div class="info">
Combo Básico
<p class="price">$20.000</p>
<button onclick="add('Combo Básico')">Agregar</button>
</div>
</div>

</div>
</div>

<div class="cart" onclick="pagar()">🛒</div>

<script>
let carrito=[];

function add(item){
  carrito.push(item);
  alert("Agregado: " + item);
}

function pagar(){
  if(carrito.length===0){
    alert("Carrito vacío");
    return;
  }

  let msg="Hola 👋 quiero comprar:%0A%0A";
  carrito.forEach(i=>msg+="✔ "+i+"%0A");

  window.location.href="https://wa.me/573165011242?text="+msg;
}
</script>

</body>
</html>
