<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Premium</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0f19;
  color:white;
}

/* HEADER */
header {
  background:#000;
  padding:15px;
  text-align:center;
  color:#e50914;
  font-size:20px;
  font-weight:bold;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
  padding:15px;
}

/* CARD */
.card {
  background:#141414;
  padding:15px;
  border-radius:12px;
  text-align:center;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

/* PRECIO */
.price {
  color:#46d369;
  font-size:18px;
}

/* BOTÓN */
button {
  background:#e50914;
  border:none;
  padding:10px;
  color:white;
  border-radius:8px;
  cursor:pointer;
  width:100%;
}

button:hover {
  background:#ff1e2d;
}

/* CARRITO FLOAT */
.cart-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#e50914;
  padding:15px;
  border-radius:50%;
  font-size:20px;
}

/* BADGE */
.badge {
  background:red;
  font-size:12px;
  padding:3px 6px;
  border-radius:5px;
}
</style>
</head>

<body>

<header>🔥 Digital Premium</header>

<h3 style="padding-left:15px;">📺 Servicios</h3>

<div class="grid">

<div class="card">
<span class="badge">TOP</span>
<h4>Netflix</h4>
<p class="price">$13.000</p>
<button onclick="add('Netflix')">Agregar</button>
</div>

<div class="card">
<h4>Spotify</h4>
<p class="price">$9.000</p>
<button onclick="add('Spotify')">Agregar</button>
</div>

<div class="card">
<h4>Disney+</h4>
<p class="price">$7.000</p>
<button onclick="add('Disney+')">Agregar</button>
</div>

</div>

<h3 style="padding-left:15px;">📦 Combos</h3>

<div class="grid">

<div class="card">
<span class="badge">🔥 Oferta</span>
<h4>Combo Full</h4>
<p>Netflix + Spotify + Disney</p>
<p class="price">$35.000</p>
<button onclick="add('Combo Full')">Agregar</button>
</div>

<div class="card">
<h4>Combo Básico</h4>
<p>Netflix + Spotify</p>
<p class="price">$20.000</p>
<button onclick="add('Combo Básico')">Agregar</button>
</div>

</div>

<!-- BOTÓN FLOTANTE -->
<div class="cart-btn" onclick="pagar()">🛒</div>

<script>
let carrito=[];

function add(item){
  carrito.push(item);
  alert("Agregado: " + item);
}

function pagar(){
  if(carrito.length === 0){
    alert("Carrito vacío");
    return;
  }

  let msg="Hola 👋 quiero comprar:%0A%0A";
  carrito.forEach(i=>msg+="✔ "+i+"%0A");

  window.location.href="https://wa.me/573165011242?text="+msg;
}
</script>

</body>
</html>
