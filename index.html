<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Premium</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}

/* HEADER */
.top{background:#000;color:#fff;text-align:center;padding:5px;font-size:13px}

header{
background:#16a34a;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{font-weight:bold}

.search{
padding:8px;
border:none;
border-radius:5px;
width:200px;
}

.cart{
background:white;
color:#16a34a;
padding:6px 10px;
border-radius:20px;
cursor:pointer;
}

/* CONTENIDO */
.container{max-width:1200px;margin:auto;padding:20px}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
padding:15px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{transform:translateY(-5px)}

.card img{
height:70px;
object-fit:contain;
}

.price{color:#16a34a;font-weight:bold;font-size:18px}

/* RATING */
.stars{color:#fbbf24;margin:5px 0}

/* BOTON */
button{
background:#16a34a;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
width:100%;
}

button:hover{background:#12813b}

/* COMBOS */
.combo{border:2px solid #16a34a}

/* NOTIFICACIÓN */
.toast{
position:fixed;
top:20px;
right:20px;
background:#16a34a;
color:white;
padding:10px 15px;
border-radius:8px;
display:none;
}

/* CARRITO */
.cart-panel{
position:fixed;
right:-350px;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
padding:15px;
transition:0.3s;
overflow:auto;
}
.cart-panel.active{right:0}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
font-size:20px;
}

</style>
</head>

<body>

<div class="top">🔥 Ofertas en plataformas digitales</div>

<header>
<div class="logo">Digital Premium</div>

<input class="search" placeholder="Buscar..." onkeyup="search(this.value)">

<div class="cart" onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>
</header>

<div class="container">

<h2>Streaming</h2>

<div class="grid" id="products">

<!-- PRODUCTOS -->

<div class="card" data-name="netflix">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
Netflix
<div class="stars">★★★★★</div>
<p class="price">$13.000</p>
<button onclick="add('Netflix',13000)">Agregar</button>
</div>

<div class="card" data-name="spotify">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg">
Spotify
<div class="stars">★★★★★</div>
<p class="price">$9.000</p>
<button onclick="add('Spotify',9000)">Agregar</button>
</div>

<div class="card" data-name="disney">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg">
Disney+
<div class="stars">★★★★★</div>
<p class="price">$7.000</p>
<button onclick="add('Disney+',7000)">Agregar</button>
</div>

<div class="card" data-name="hbo">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/33/HBO_Max_Logo.svg">
HBO Max
<div class="stars">★★★★★</div>
<p class="price">$7.000</p>
<button onclick="add('HBO Max',7000)">Agregar</button>
</div>

</div>

<h2>Combos</h2>

<div class="grid">

<div class="card combo">
🔥 Combo Básico
<p>Netflix + Spotify</p>
<p class="price">$20.000</p>
<button onclick="add('Combo Básico',20000)">Agregar</button>
</div>

<div class="card combo">
💎 Combo Premium
<p>Todo incluido</p>
<p class="price">$50.000</p>
<button onclick="add('Combo Premium',50000)">Agregar</button>
</div>

</div>

</div>

<!-- NOTIFICACIÓN -->
<div class="toast" id="toast">Agregado al carrito</div>

<!-- CARRITO -->
<div class="cart-panel" id="cart">
<h3>🛒 Carrito</h3>
<div id="items"></div>
<p>Total: $<span id="total">0</span></p>
<button onclick="checkout()">Finalizar compra</button>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/573165011242">💬</a>

<script>
let cart=[];

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function add(name,price){
cart.push({name,price});
render();
toast();
}

function render(){
let html="";
let total=0;

cart.forEach(i=>{
total+=i.price;
html+=<p>${i.name} - $${i.price}</p>;
});

document.getElementById("items").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("count").innerText=cart.length;
}

function checkout(){
let msg="Hola quiero comprar:%0A";
cart.forEach(i=>msg+=i.name+" $"+i.price+"%0A");
window.location.href="https://wa.me/573165011242?text="+msg;
}

function toast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

function search(value){
value=value.toLowerCase();
document.querySelectorAll(".card").forEach(card=>{
card.style.display = card.dataset.name?.includes(value) ? "block" : "none";
});
}
</script>

</body>
</html>
