<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Premium</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
header{
background:#1aa34a;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.cart-icon{
cursor:pointer;
background:#fff;
color:#1aa34a;
padding:6px 10px;
border-radius:20px;
}

/* GRID */
.container{max-width:1100px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}

/* CARD */
.card{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.price{color:#1aa34a;font-weight:bold}

button{
background:#1aa34a;
color:white;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
width:100%;
}

/* CARRITO */
.cart{
position:fixed;
right:-350px;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-2px 0 10px rgba(0,0,0,0.2);
padding:15px;
transition:0.3s;
overflow:auto;
}

.cart.active{right:0}

.item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.total{
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<header>
🔥 Digital Premium
<div class="cart-icon" onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>
</header>

<div class="container">

<h2>Plataformas</h2>
<div class="grid">

<div class="card">
Netflix
<p class="price">$13.000</p>
<button onclick="add('Netflix',13000)">Agregar</button>
</div>

<div class="card">
Spotify
<p class="price">$9.000</p>
<button onclick="add('Spotify',9000)">Agregar</button>
</div>

<div class="card">
Disney+
<p class="price">$7.000</p>
<button onclick="add('Disney+',7000)">Agregar</button>
</div>

<div class="card">
HBO Max
<p class="price">$7.000</p>
<button onclick="add('HBO Max',7000)">Agregar</button>
</div>

<div class="card">
Prime Video
<p class="price">$8.000</p>
<button onclick="add('Prime Video',8000)">Agregar</button>
</div>

</div>

<h2>Combos</h2>
<div class="grid">

<div class="card">
Combo Básico
<p class="price">$20.000</p>
<button onclick="add('Combo Básico',20000)">Agregar</button>
</div>

<div class="card">
Combo Full
<p class="price">$35.000</p>
<button onclick="add('Combo Full',35000)">Agregar</button>
</div>

</div>

</div>

<!-- CARRITO -->
<div class="cart" id="cart">
<h3>Carrito</h3>
<div id="items"></div>
<div class="total">Total: $<span id="total">0</span></div>
<br>
<button onclick="checkout()">Finalizar compra</button>
</div>

<script>
let cart=[];

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function add(name,price){
cart.push({name,price});
render();
}

function render(){
let items=document.getElementById("items");
items.innerHTML="";
let total=0;

cart.forEach((item,i)=>{
total+=item.price;
items.innerHTML+=`
<div class="item">
${item.name}
<span>$${item.price}</span>
</div>`;
});

document.getElementById("total").innerText=total;
document.getElementById("count").innerText=cart.length;
}

function checkout(){
let msg="Hola 👋 quiero comprar:%0A%0A";
cart.forEach(i=>msg+=i.name+" - $"+i.price+"%0A");

window.location.href="https://wa.me/573165011242?text="+msg;
}
</script>

</body>
</html>
